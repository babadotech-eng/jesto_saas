openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Precifica API - Financial management and recipe costing for small food businesses
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: produtos
    description: Products
  - name: insumos
    description: Ingredients
  - name: fichas
    description: Recipe sheets
  - name: despesas
    description: Fixed costs
  - name: lancamentos
    description: Cash flow entries
  - name: relatorios
    description: Reports and analytics
  - name: assinaturas
    description: Subscriptions
  - name: funcionarios
    description: Employees and payroll (Premium)
  - name: codigos
    description: Promotional coupon codes (public)
  - name: admin
    description: Admin-only endpoints (restricted to admin email)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfil"
        "401":
          description: Unauthorized

  /produtos:
    get:
      operationId: listProdutos
      tags: [produtos]
      summary: List products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Produto"
    post:
      operationId: createProduto
      tags: [produtos]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdutoInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"

  /produtos/{id}:
    get:
      operationId: getProduto
      tags: [produtos]
      summary: Get product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
        "404":
          description: Not found
    put:
      operationId: updateProduto
      tags: [produtos]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProdutoInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
    delete:
      operationId: deleteProduto
      tags: [produtos]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /insumos:
    get:
      operationId: listInsumos
      tags: [insumos]
      summary: List ingredients
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insumo"
    post:
      operationId: createInsumo
      tags: [insumos]
      summary: Create an ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsumoInput"
      responses:
        "201":
          description: Created ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insumo"

  /insumos/{id}:
    put:
      operationId: updateInsumo
      tags: [insumos]
      summary: Update an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsumoInput"
      responses:
        "200":
          description: Updated ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insumo"
    delete:
      operationId: deleteInsumo
      tags: [insumos]
      summary: Delete an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /fichas:
    get:
      operationId: listFichas
      tags: [fichas]
      summary: List recipe sheets
      responses:
        "200":
          description: List of recipe sheets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FichaTecnica"
    post:
      operationId: createFicha
      tags: [fichas]
      summary: Create a recipe sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FichaInput"
      responses:
        "201":
          description: Created recipe sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FichaTecnica"

  /fichas/{id}:
    get:
      operationId: getFicha
      tags: [fichas]
      summary: Get recipe sheet with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recipe sheet with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FichaTecnicaDetalhada"
    put:
      operationId: updateFicha
      tags: [fichas]
      summary: Update recipe sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FichaInput"
      responses:
        "200":
          description: Updated recipe sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FichaTecnica"
    delete:
      operationId: deleteFicha
      tags: [fichas]
      summary: Delete a recipe sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /fichas/{id}/itens:
    post:
      operationId: addFichaItem
      tags: [fichas]
      summary: Add item to recipe sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FichaItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FichaItem"

  /fichas/{id}/itens/{itemId}:
    put:
      operationId: updateFichaItem
      tags: [fichas]
      summary: Update item in recipe sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FichaItemInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FichaItem"
    delete:
      operationId: deleteFichaItem
      tags: [fichas]
      summary: Delete item from recipe sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /funcionarios:
    get:
      operationId: listFuncionarios
      tags: [funcionarios]
      summary: List employees (Premium only)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Funcionario" }
        "403":
          description: Premium required
    post:
      operationId: createFuncionario
      tags: [funcionarios]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FuncionarioInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Funcionario" }

  /funcionarios/{id}:
    put:
      operationId: updateFuncionario
      tags: [funcionarios]
      summary: Update employee
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FuncionarioInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Funcionario" }
    delete:
      operationId: deleteFuncionario
      tags: [funcionarios]
      summary: Delete employee
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Deleted

  /despesas:
    get:
      operationId: listDespesas
      tags: [despesas]
      summary: List fixed costs
      responses:
        "200":
          description: List of fixed costs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Despesa"
    post:
      operationId: createDespesa
      tags: [despesas]
      summary: Create a fixed cost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DespesaInput"
      responses:
        "201":
          description: Created fixed cost
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Despesa"

  /despesas/{id}:
    put:
      operationId: updateDespesa
      tags: [despesas]
      summary: Update a fixed cost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DespesaInput"
      responses:
        "200":
          description: Updated fixed cost
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Despesa"
    delete:
      operationId: deleteDespesa
      tags: [despesas]
      summary: Delete a fixed cost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /lancamentos:
    get:
      operationId: listLancamentos
      tags: [lancamentos]
      summary: List cash flow entries
      responses:
        "200":
          description: List of cash flow entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lancamento"
    post:
      operationId: createLancamento
      tags: [lancamentos]
      summary: Create a cash flow entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LancamentoInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lancamento"

  /lancamentos/{id}:
    put:
      operationId: updateLancamento
      tags: [lancamentos]
      summary: Update a cash flow entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LancamentoInput"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lancamento"
    delete:
      operationId: deleteLancamento
      tags: [lancamentos]
      summary: Delete a cash flow entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /relatorios/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [relatorios]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /relatorios/top-produtos:
    get:
      operationId: getTopProdutos
      tags: [relatorios]
      summary: Get top products by margin
      responses:
        "200":
          description: Top products ranked by margin
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProdutoRanking"

  /relatorios/alertas-margem:
    get:
      operationId: getAlertasMargem
      tags: [relatorios]
      summary: Get products with low margin alerts
      responses:
        "200":
          description: Products with low margins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertaMargem"

  /relatorios/fluxo-semanal:
    get:
      operationId: getFluxoSemanal
      tags: [relatorios]
      summary: Get 7-day cash flow trend
      responses:
        "200":
          description: Weekly cash flow data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FluxoDiario"

  /relatorios/ponto-equilibrio:
    get:
      operationId: getPontoEquilibrio
      tags: [relatorios]
      summary: Get break-even analysis
      responses:
        "200":
          description: Break-even data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PontoEquilibrio"

  /assinaturas/current:
    get:
      operationId: getAssinatura
      tags: [assinaturas]
      summary: Get current subscription
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assinatura"

  /codigos/validar:
    get:
      operationId: validarCodigo
      tags: [codigos]
      summary: Validate a promotional coupon code (public)
      parameters:
        - name: codigo
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodigoValidacaoResult"
        "400":
          description: Invalid, expired, or exhausted coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Coupon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assinaturas:
    post:
      operationId: createAssinatura
      tags: [assinaturas]
      summary: Create or update subscription, optionally applying a coupon atomically
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssinaturaInput"
      responses:
        "201":
          description: Subscription created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assinatura"
        "400":
          description: Invalid plan or coupon error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/promo-codes:
    get:
      operationId: adminListPromoCodes
      tags: [admin]
      summary: List all promo codes with usage stats (admin only, paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of promo codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPromoCodeList"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Perfil:
      type: object
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        nome:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
      required: [id]

    Produto:
      type: object
      properties:
        id:
          type: string
        nome:
          type: string
        categoria:
          type: ["string", "null"]
        preco_venda:
          type: number
        custo_mao_obra:
          type: number
        frete:
          type: number
        imposto_pct:
          type: number
        taxa_cartao_pct:
          type: number
        taxa_app_pct:
          type: number
        comissao_pct:
          type: number
        taxa_vr_pct:
          type: number
        cmv:
          type: ["number", "null"]
        margem_contribuicao:
          type: ["number", "null"]
        margem_pct:
          type: ["number", "null"]
        created_at:
          type: ["string", "null"]
      required: [id, nome, preco_venda, custo_mao_obra, frete, imposto_pct, taxa_cartao_pct, taxa_app_pct, comissao_pct, taxa_vr_pct]

    ProdutoInput:
      type: object
      properties:
        nome:
          type: string
        categoria:
          type: ["string", "null"]
        preco_venda:
          type: number
        custo_mao_obra:
          type: number
        frete:
          type: number
        imposto_pct:
          type: number
        taxa_cartao_pct:
          type: number
        taxa_app_pct:
          type: number
        comissao_pct:
          type: number
        taxa_vr_pct:
          type: number
      required: [nome, preco_venda, custo_mao_obra, frete, imposto_pct, taxa_cartao_pct, taxa_app_pct, comissao_pct, taxa_vr_pct]

    Insumo:
      type: object
      properties:
        id:
          type: string
        nome:
          type: string
        unidade:
          type: string
        preco_unitario:
          type: number
        fator_correcao:
          type: number
        peso_bruto:
          type: ["number", "null"]
        peso_liquido:
          type: ["number", "null"]
        fornecedor:
          type: ["string", "null"]
        embalagem:
          type: ["string", "null"]
        quantidade_em_estoque:
          type: number
        created_at:
          type: ["string", "null"]
      required: [id, nome, unidade, preco_unitario, fator_correcao, quantidade_em_estoque]

    InsumoInput:
      type: object
      properties:
        nome:
          type: string
        unidade:
          type: string
        preco_unitario:
          type: number
        fator_correcao:
          type: number
        peso_bruto:
          type: ["number", "null"]
        peso_liquido:
          type: ["number", "null"]
        fornecedor:
          type: ["string", "null"]
        embalagem:
          type: ["string", "null"]
        quantidade_em_estoque:
          type: number
      required: [nome, unidade, preco_unitario, fator_correcao]

    FichaTecnica:
      type: object
      properties:
        id:
          type: string
        produto_id:
          type: string
        produto_nome:
          type: ["string", "null"]
        rendimento:
          type: ["number", "null"]
        unidade_rendimento:
          type: ["string", "null"]
        cmv_total:
          type: ["number", "null"]
        created_at:
          type: ["string", "null"]
      required: [id, produto_id]

    FichaTecnicaDetalhada:
      type: object
      properties:
        id:
          type: string
        produto_id:
          type: string
        produto_nome:
          type: ["string", "null"]
        rendimento:
          type: ["number", "null"]
        unidade_rendimento:
          type: ["string", "null"]
        cmv_total:
          type: ["number", "null"]
        itens:
          type: array
          items:
            $ref: "#/components/schemas/FichaItemDetalhado"
        created_at:
          type: ["string", "null"]
      required: [id, produto_id, itens]

    FichaInput:
      type: object
      properties:
        produto_id:
          type: string
        rendimento:
          type: ["number", "null"]
        unidade_rendimento:
          type: ["string", "null"]
      required: [produto_id]

    FichaItem:
      type: object
      properties:
        id:
          type: string
        ficha_id:
          type: string
        insumo_id:
          type: string
        quantidade:
          type: number
      required: [id, ficha_id, insumo_id, quantidade]

    FichaItemDetalhado:
      type: object
      properties:
        id:
          type: string
        insumo_id:
          type: string
        insumo_nome:
          type: ["string", "null"]
        unidade:
          type: ["string", "null"]
        preco_unitario:
          type: ["number", "null"]
        fator_correcao:
          type: ["number", "null"]
        quantidade:
          type: number
        custo_item:
          type: ["number", "null"]
      required: [id, insumo_id, quantidade]

    FichaItemInput:
      type: object
      properties:
        insumo_id:
          type: string
        quantidade:
          type: number
      required: [insumo_id, quantidade]

    Despesa:
      type: object
      properties:
        id:
          type: string
        descricao:
          type: string
        valor:
          type: number
        categoria:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
      required: [id, descricao, valor]

    DespesaInput:
      type: object
      properties:
        descricao:
          type: string
        valor:
          type: number
        categoria:
          type: ["string", "null"]
      required: [descricao, valor]

    Funcionario:
      type: object
      properties:
        id: { type: string }
        nome: { type: string }
        salario: { type: number }
        setor: { type: ["string", "null"] }
        cargo: { type: ["string", "null"] }
        tipo_contratacao: { type: string }
        vale_transporte: { type: number }
        vale_refeicao: { type: number }
        convenio_medico: { type: number }
        carga_horaria_mensal: { type: number }
        provisao_ferias_pct: { type: number }
        provisao_terco_ferias_pct: { type: number }
        provisao_decimo_terceiro_pct: { type: number }
        provisao_decimo_terceiro_ferias_pct: { type: number }
        inss_patronal_pct: { type: number }
        sat_rat_pct: { type: number }
        salario_educacao_pct: { type: number }
        sistema_s_pct: { type: number }
        fgts_pct: { type: number }
        fgts_rescisao_pct: { type: number }
        encargos_trabalhistas_pct: { type: number }
        encargos_sociais_pct: { type: number }
        encargos_totais_pct: { type: number }
        valor_encargos: { type: number }
        total_mensal: { type: number }
        valor_hora: { type: number }
        created_at: { type: ["string", "null"] }
