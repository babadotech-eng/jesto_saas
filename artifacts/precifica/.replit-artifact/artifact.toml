kind = "web"
previewPath = "/"
title = "Jesto"
version = "1.0.0"
id = "artifacts/precifica"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19689

[services.development]
run = "pnpm --filter @workspace/precifica run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/precifica", "run", "build" ]
publicDir = "artifacts/precifica/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19689"
BASE_PATH = "/"
